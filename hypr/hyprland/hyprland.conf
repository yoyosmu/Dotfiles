################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/

monitor=eDP-1,preferred,1440x92,auto
monitor=HDMI-A-1,preferred,0x0,auto

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

$terminal = kitty
$fileManager = nemo
$menu = rofi -show drun
$WOBSOCK = $XDG_RUNTIME_DIR/wob.sock

#################
### AUTOSTART ###
#################

exec-once = waybar -c ~/.config/waybar/config2 -s ~/.config/waybar/style2.css & hyprpaper & hypridle & waybar & eww daemon & poweralertd & /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 & dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP & hyprsunset -t 5500 & brightnessctl set 100% & dbus-launch --exit-with-session swaync & hyprpm reload &  rm -f $WOBSOCK && mkfifo $WOBSOCK && tail -f $WOBSOCK | wob &

#############################
### ENVIRONMENT VARIABLES ###
#############################


env = XCURSOR_SIZE,22
env = HYPRCURSOR_SIZE,22
env = XCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = GTK_MODULES,canberra-gtk-module

###################
### PERMISSIONS ###
###################

# See https://wiki.hyprland.org/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

plugin {
    hyprbars {
        bar_height = 12
        bar_button_padding = 12
        bar_padding = 1
        col.text = rgb(F3EEE1)
        bar_precedence_over_border = true
        hyprbars-button = rgb(ad4747), 20, , hyprctl dispatch killactive
        hyprbars-button = rgb(6b8d66), 20, 󰊓, hyprctl dispatch fullscreen 2
        hyprbars-button = rgb(d98e62), 20, 󰖲, hyprctl dispatch togglefloating
   }
    overview {
        panelHeight = 150
        workspaceMargin = 5
        workspaceBorderSize = 2
        gapsIn = 2
        gapsOut = 2
        reservedArea = 0
        workspaceActiveBorder = rgba(122, 211, 122, 1) 
        workspaceInactiveBorder = rgba(62, 146, 72, 0.5) 
        showEmptyWorkspace = true
        affectStrut = false
    }
}

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 2
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(7Ad37aff)
    col.inactive_border = rgba(3e924a80)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
  
    snap {
        enabled = true
        window_gap = 15
        monitor_gap = 15
        border_overlap = false
    }

}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 5
    
   # Change transparency of focused and unfocused windows
    active_opacity = 0.7
    inactive_opacity = 0.6

    blur {
        enabled = true
        size = 7
        passes = 2
        ignore_opacity = true 
        contrast = 1.5
       	new_optimizations = true
        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint, 0.23,1,0.32,1
    bezier = easeInOutCubic, 0.65,0.05,0.36,1
    bezier = linear ,0,0,1,1
    bezier = almostLinear, 0.5,0.5,0.75,1.0
    bezier = quick, 0.15,0,0.1,1
    bezier = Decel, 0.05, 0.9, 0.1, 1.05
    
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4, Decel, slide
    animation = windowsIn, 1, 4, Decel, slide bottom
    animation = windowsOut, 1, 4, Decel, slide bottom 
    animation = windowsMove, 1, 4, Decel, slide
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fadeIn
    animation = layersOut, 1, 1.5, linear, fadeOut
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 5.5, Decel, slidefade   
    animation = workspacesIn, 1, 4.5, Decel, slidefadeIn
    animation = workspacesOut, 1, 5.5, Decel, slidefadeOut

}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    vfr = true
    force_default_wallpaper = -1
    disable_hyprland_logo = true 
}

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# See https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, J, togglesplit, 
bind = $mainMod, H, exec, sh -c 'grim -g "$(slurp)" ~/Pictures/_$(date +%Y%m%d_%H%M%S).png'
bind = $mainMod, G, exec, grim
bind = $mainMod, W, exec, pkill -USR1 waybar	
bind = $mainMod, Tab, overview:toggle

# Switch workspaces with mainMod + [0-9], Arrow Keys or Scroll Wheel
bind = $mainMod, LEFT, workspace, -1
bind = $mainMod, RIGHT, workspace, +1
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, +1
bind = $mainMod, mouse_up, workspace, -1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ && wpctl get-volume @DEFAULT_AUDIO_SINK@ | sed 's/[^0-9]//g' > $WOBSOCK
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && wpctl get-volume @DEFAULT_AUDIO_SINK@ | sed 's/[^0-9]//g' > $WOBSOCK
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && (wpctl get-volume @DEFAULT_AUDIO_SINK@ | grep -q MUTED && echo 0 > $WOBSOCK) || wpctl get-volume @DEFAULT_AUDIO_SINK@ | sed 's/[^0-9]//g' > $WOBSOCK
bindl  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindle = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+ | sed -En 's/.*\(([0-9]+)%\).*/\1/p' > $WOBSOCK
bindle = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%- | sed -En 's/.*\(([0-9]+)%\).*/\1/p' > $WOBSOCK

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

