################
### SOURCES ###
################

source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/binds.conf

#################
### AUTOSTART ###
#################

exec-once = hyprpaper & hypridle & waybar & wl-clip-persist --clipboard regular & wl-paste --type text --watch cliphist store & wl-paste --type image --watch cliphist store & /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 & snappy-switcher --daemon & poweralertd & dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP & hyprsunset -t 5500 & dbus-update-activation-environment --systemd HYPRLAND_INSTANCE_SIGNATURE & brightnessctl set 100% & dbus-launch --exit-with-session swaync & hyprpm reload &  rm -f $WOBSOCK && mkfifo $WOBSOCK && tail -f $WOBSOCK | wob & ~/.config/swaync/scripts/battery-notify.sh & ignis init & easyeffects --gapplication-service 

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,22
env = HYPRCURSOR_SIZE,22
env = XCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = GTK_MODULES,canberra-gtk-module
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,ColloidDark
env = LIBVA_DRIVER_NAME,iHD
env = VDPAU_DRIVER,va_gl
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = SDL_VIDEODRIVER,wayland
env = WANT_WAYLAND,0

###################
### PERMISSIONS ###
###################

# See https://wiki.hyprland.org/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

plugin {
    hyprbars {
        bar_height = 13
        bar_button_padding = 12
        bar_padding = 1
        col.text = rgb(F3EEE1)
        bar_precedence_over_border = true
        hyprbars-button = rgb(ad4747), 25,  , hyprctl dispatch killactive
        hyprbars-button = rgb(6b8d66), 25, 󰊓 , hyprctl dispatch fullscreen 2
        hyprbars-button = rgb(d98e62), 25, 󰖲 , hyprctl dispatch togglefloating
   }
   scrolloverview {
           gesture_distance = 300
           scale = 0.5
           workspace_gap = 100
           wallpaper = 2
           blur = true
     }
}

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 2
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(3e924a80)
    col.inactive_border = rgba(3e924a80)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
  
    snap {
        enabled = true
        window_gap = 15
        monitor_gap = 15
        border_overlap = false
    }

}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 5
    active_opacity = 0.7
    inactive_opacity = 0.6

    shadow {
    	range = 15
    	render_power = 4
    }
    
    blur {
        enabled = true
        size = 7
        passes = 2
        ignore_opacity = true 
        contrast = 1.5
       	new_optimizations = true
        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint, 0.23,1,0.32,1
    bezier = easeInOutCubic, 0.65,0.05,0.36,1
    bezier = linear ,0,0,1,1
    bezier = almostLinear, 0.5,0.5,0.75,1.0
    bezier = quick, 0.15,0,0.1,1
    bezier = Decel, 0.05, 0.9, 0.1, 1.05
    
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4, Decel, slide
    animation = windowsIn, 1, 4, Decel, slide bottom
    animation = windowsOut, 1, 4, Decel, slide bottom 
    animation = windowsMove, 1, 4, Decel, slide
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 5.5, Decel, slidefade   
    animation = workspacesIn, 1, 4.5, Decel, slidefadeIn
    animation = workspacesOut, 1, 5.5, Decel, slidefadeOut
}

dwindle {
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true 
}

debug {
    vfr = true
}

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules
# Example windowrule 
# windowrule = float, ^(kitty)$

windowrule = float on, match:title ^(.*Network Manager.*)$
windowrule = float on, match:title ^(HyprEmoji)$
windowrule = move (cursor_x-(window_w*0.5)) (cursor_y-(window_h*0.05)), match:title ^(HyprEmoji)$
windowrule = match:float 0, no_shadow on
