background {
    monitor =
    path = /home/yoyomu/dotfiles/hypr/hyprpaper/background.jpg
    blur_size = 0
    blur_passes = 0
    brightness = 0.0
}

input-field {
    monitor =
    size = 200, 40
    outline_thickness = 0
    dots_size = 0.25
    dots_spacing = 0.35
    dots_center = false
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.2)
    font_color = rgba(221,218,211,1)
    fade_on_empty = false
    rounding = 10
    check_color = rgb(204, 136, 34)
    placeholder_text = Enter Password
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor = 
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(242, 243, 244, 0.75)
    font_size = 70
    font_family = Montserrat
    font_weight = 900
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d, %Y")"
    color = rgba(221,218,211,1)
    font_size = 14
    font_family = Montserrat
    font_weight = 600
    position = 0, 135
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = rgba(221,218,211,1)
    font_size = 16
    font_family = Montserrat
    font_weight = 700
    position = 0, 20
    halign = center
    valign = center
}

label {
    monitor =
    text =  
    color = rgba(221,218,211,1)
    font_size = 55
    font_family = Montserrat
    font_weight = 700
    position = 0, 75
    halign = center
    valign = center
}

# SUSPEND (SLEEP)
label {
    monitor =
    text = 󰤄
    color = rgba(221,218,211,0.8)
    font_size = 20
    font_family = Montserrat
    position = -100, 50
    halign = center
    valign = bottom
    on-click = systemctl suspend
}

# REBOOT
label {
    monitor =
    text =  
    color = rgba(221,218,211,0.8)
    font_size = 20
    font_family = Montserrat
    position = 0, 50
    halign = center
    valign = bottom
    on-click = systemctl reboot
}

# POWER OFF
label {
    monitor =
    text = 
    color = rgba(221,218,211,0.8)
    font_size = 20
    font_family = Montserrat
    position = 100, 50
    halign = center
    valign = bottom
    on-click = systemctl poweroff
}
